kind = "web"
previewPath = "/"
title = "Peacock Drivers"
version = "1.0.0"
id = "artifacts/peacock-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23785
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/peacock-app run dev"

[services.env]
PORT = "23785"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/peacock-app", "run", "build"]
publicDir = "artifacts/peacock-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
